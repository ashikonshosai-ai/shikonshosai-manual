<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>事務所マニュアル</title>
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; background: #f8fafc; height: 100vh; display: flex; flex-direction: column; }

  /* ヘッダー */
  .header { background: #1e3a5f; color: white; padding: 12px 24px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  .header-eyebrow { font-size: 11px; color: #93c5fd; }
  .header-title { font-size: 18px; font-weight: 600; }

  /* 2カラムレイアウト */
  .layout { display: flex; flex: 1; overflow: hidden; }

  /* 左ペイン */
  .left-pane {
    width: 180px; min-width: 180px;
    background: #f8fafc;
    border-right: 1px solid #e2e8f0;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .left-pane-list { flex: 1; overflow-y: auto; padding: 8px 0; }
  .left-pane-footer { padding: 8px; border-top: 1px solid #e2e8f0; }
  .cat-item {
    padding: 6px 8px 6px 16px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    color: #334155;
    border-left: 3px solid transparent;
    display: flex;
    align-items: center;
    min-width: 0;
  }
  .cat-item:hover { background: #f1f5f9; }
  .cat-item.active { background: #eff6ff; border-left-color: #3b82f6; color: #1d4ed8; font-weight: 600; }
  .cat-item-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cat-actions { display: none; gap: 1px; flex-shrink: 0; }
  .cat-item:hover .cat-actions { display: flex; }
  .cat-act-btn { background: none; border: none; cursor: pointer; font-size: 11px; color: #94a3b8; padding: 2px 4px; border-radius: 3px; line-height: 1; }
  .cat-act-btn:hover { color: #475569; background: #e2e8f0; }
  .cat-act-btn.del:hover { color: #ef4444; background: #fee2e2; }
  .field-select { width: 100%; border: 1.5px solid #e2e8f0; border-radius: 7px; padding: 8px 10px; font-size: 13px; font-family: inherit; margin-bottom: 14px; background: white; }

  /* 右ペイン */
  .right-pane { flex: 1; background: #ffffff; display: flex; flex-direction: column; max-width: 860px; overflow: hidden; }
  .right-pane-content { flex: 1; overflow-y: auto; padding: 24px; }
  .right-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .right-title { font-size: 16px; font-weight: 700; color: #0f172a; }

  /* ボタン */
  .btn { padding: 7px 14px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; }
  .btn-blue { background: #2563eb; color: #fff; }
  .btn-blue:hover { background: #1d4ed8; }
  .btn-gray { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
  .btn-gray:hover { background: #e2e8f0; }
  .btn-text-red { background: none; border: none; color: #ef4444; font-size: 13px; cursor: pointer; padding: 4px 8px; }
  .btn-text-red:hover { text-decoration: underline; }
  .btn-add { width: 100%; padding: 8px; background: #eff6ff; color: #2563eb; border: 1px dashed #93c5fd; border-radius: 6px; font-size: 13px; cursor: pointer; }
  .btn-add:hover { background: #dbeafe; }
  .btn-sm { padding: 3px 8px; border-radius: 4px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid #e2e8f0; background: #f8fafc; color: #475569; }
  .btn-sm:hover { background: #e2e8f0; }

  /* カード */
  .card { border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 10px; overflow: hidden; }
  .card-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; cursor: pointer; background: #f8fafc; }
  .card-header:hover { background: #f1f5f9; }
  .card-title { font-size: 14px; font-weight: 600; color: #0f172a; }
  .card-meta { font-size: 11px; color: #94a3b8; white-space: nowrap; margin-left: 8px; }
  .card-badge { display: inline-block; font-size: 11px; background: #eff6ff; color: #1d4ed8; padding: 2px 7px; border-radius: 10px; margin-left: 8px; }
  .card-body { display: none; padding: 16px; border-top: 1px solid #e2e8f0; }
  .card-body.open { display: block; }
  .card-content { font-size: 13px; color: #334155; line-height: 1.7; margin-bottom: 12px; }
  .card-content h1, .card-content h2, .card-content h3 { margin: 8px 0 4px; }
  .card-content p { margin-bottom: 4px; }
  .card-content ul, .card-content ol { padding-left: 20px; margin-bottom: 4px; }
  #quill-editor { height: 200px; background: white; margin-bottom: 14px; border-radius: 7px; }
  .card-video-link { display: inline-block; font-size: 13px; color: #2563eb; font-weight: 600; margin-bottom: 12px; }
  .card-actions { display: flex; gap: 8px; align-items: center; }

  /* 画像表示（カード内） */
  .card-images { margin-bottom: 12px; }
  .card-image-item { margin-bottom: 16px; }
  .card-image-caption { font-size: 12px; color: #64748b; margin-bottom: 4px; }
  .card-image-img { width: 100%; max-width: 600px; border-radius: 6px; border: 1px solid #e2e8f0; display: block; }

  /* モーダル */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 100; align-items: center; justify-content: center; }
  .overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 12px; padding: 28px; width: 560px; max-width: 95vw; max-height: 90vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,.18); }
  .modal-title { font-size: 15px; font-weight: 700; color: #0f172a; margin-bottom: 18px; }
  .field-label { font-size: 12px; color: #475569; margin-bottom: 4px; }
  .field-input { width: 100%; border: 1.5px solid #e2e8f0; border-radius: 7px; padding: 8px 10px; font-size: 13px; font-family: inherit; margin-bottom: 14px; }
  .field-input:focus { outline: none; border-color: #3b82f6; }
  .field-textarea { width: 100%; height: 200px; border: 1.5px solid #e2e8f0; border-radius: 7px; padding: 10px; font-size: 13px; font-family: inherit; resize: vertical; margin-bottom: 14px; }
  .field-textarea:focus { outline: none; border-color: #3b82f6; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

  /* モーダル内画像管理 */
  .img-list { margin-bottom: 10px; }
  .img-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px; border: 1px solid #e2e8f0; border-radius: 6px; margin-bottom: 6px; background: #f8fafc; }
  .img-thumb { width: 80px; height: 60px; object-fit: cover; border-radius: 4px; border: 1px solid #e2e8f0; flex-shrink: 0; }
  .img-item-body { flex: 1; min-width: 0; }
  .img-caption-input { width: 100%; border: 1px solid #e2e8f0; border-radius: 5px; padding: 5px 8px; font-size: 12px; font-family: inherit; margin-bottom: 6px; }
  .img-caption-input:focus { outline: none; border-color: #3b82f6; }
  .img-item-actions { display: flex; gap: 4px; }
  .img-upload-area { border: 1.5px dashed #93c5fd; border-radius: 7px; padding: 12px; text-align: center; cursor: pointer; color: #2563eb; font-size: 13px; background: #eff6ff; margin-bottom: 14px; }
  .img-upload-area:hover { background: #dbeafe; }
  .img-uploading { font-size: 12px; color: #64748b; margin-top: 6px; }

  /* 空状態 */
  .empty { color: #94a3b8; font-size: 13px; padding: 24px 0; }

  /* 検索バー */
  .search-bar { padding: 10px 16px; border-bottom: 1px solid #e2e8f0; background: #fff; flex-shrink: 0; display: flex; gap: 8px; }
  .search-input { flex: 1; padding: 7px 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 13px; font-family: inherit; }
  .search-input:focus { outline: none; border-color: #3b82f6; }

  /* 左ペイン ナビ */
  .left-pane-nav { padding: 8px 0 0; border-bottom: 1px solid #e2e8f0; flex-shrink: 0; }
  .nav-label { font-size: 10px; color: #94a3b8; font-weight: 600; padding: 0 16px 4px; letter-spacing: .05em; text-transform: uppercase; }
  .nav-item { padding: 8px 16px; cursor: pointer; font-size: 13px; font-weight: 500; color: #334155; display: flex; align-items: center; gap: 6px; border-left: 3px solid transparent; }
  .nav-item:hover { background: #f1f5f9; }
  .nav-item.active { background: #eff6ff; border-left-color: #3b82f6; color: #1d4ed8; font-weight: 600; }

  /* ホーム画面 */
  .home-section-title { font-size: 13px; font-weight: 700; color: #475569; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid #e2e8f0; }
  .notice-card { border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: flex-start; gap: 10px; background: #fff; }
  .notice-card.important { border-color: #fca5a5; background: #fff7f7; }
  .notice-badge { font-size: 10px; font-weight: 700; background: #ef4444; color: #fff; padding: 2px 6px; border-radius: 10px; white-space: nowrap; flex-shrink: 0; margin-top: 2px; }
  .notice-content { flex: 1; font-size: 13px; color: #334155; line-height: 1.6; }
  .notice-meta { font-size: 11px; color: #94a3b8; margin-top: 4px; }
  .notice-del { background: none; border: none; color: #cbd5e1; cursor: pointer; font-size: 14px; padding: 0 2px; flex-shrink: 0; }
  .notice-del:hover { color: #ef4444; }
  .updates-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .update-card { border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px 14px; cursor: pointer; background: #fff; }
  .update-card:hover { background: #f8fafc; }
  .update-title { font-size: 13px; font-weight: 600; color: #0f172a; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .update-cat { font-size: 11px; background: #eff6ff; color: #1d4ed8; padding: 2px 6px; border-radius: 10px; display: inline-block; margin-bottom: 4px; }
  .update-date { font-size: 11px; color: #94a3b8; }

  /* 検索結果 */
  .search-result-cat { font-size: 11px; background: #f1f5f9; color: #475569; padding: 2px 7px; border-radius: 10px; margin-left: 6px; }

  /* Q&A */
  .qa-card { border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 10px; overflow: hidden; }
  .qa-card-header { display: flex; justify-content: space-between; align-items: flex-start; padding: 14px 16px; cursor: pointer; background: #f8fafc; gap: 8px; }
  .qa-card-header:hover { background: #f1f5f9; }
  .qa-card-title { font-size: 14px; font-weight: 600; color: #0f172a; flex: 1; }
  .qa-badge-unanswered { font-size: 10px; font-weight: 700; background: #ef4444; color: #fff; padding: 2px 7px; border-radius: 10px; white-space: nowrap; margin-left: 6px; flex-shrink: 0; }
  .qa-badge-answered { font-size: 10px; font-weight: 700; background: #22c55e; color: #fff; padding: 2px 7px; border-radius: 10px; white-space: nowrap; margin-left: 6px; flex-shrink: 0; }
  .qa-body { display: none; padding: 16px; border-top: 1px solid #e2e8f0; }
  .qa-body.open { display: block; }
  .qa-answer { border-left: 3px solid #3b82f6; padding: 10px 14px; margin-bottom: 10px; background: #f8fafc; border-radius: 0 6px 6px 0; }
  .qa-answer-content { font-size: 13px; color: #334155; line-height: 1.6; white-space: pre-wrap; }
  .qa-answer-meta { font-size: 11px; color: #94a3b8; margin-top: 4px; }
  .qa-reply-form { border-top: 1px solid #e2e8f0; padding-top: 12px; margin-top: 4px; }
  .qa-reply-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: flex-start; }
  .qa-reply-name { width: 120px; flex-shrink: 0; border: 1.5px solid #e2e8f0; border-radius: 6px; padding: 7px 8px; font-size: 13px; font-family: inherit; }
  .qa-reply-name:focus { outline: none; border-color: #3b82f6; }
  .qa-reply-textarea { flex: 1; border: 1.5px solid #e2e8f0; border-radius: 6px; padding: 7px 8px; font-size: 13px; font-family: inherit; resize: vertical; min-height: 60px; }
  .qa-reply-textarea:focus { outline: none; border-color: #3b82f6; }
  .home-qa-card { border: 1px solid #fde68a; border-radius: 8px; padding: 10px 14px; margin-bottom: 8px; background: #fffbeb; cursor: pointer; }
  .home-qa-card:hover { background: #fef3c7; }

  /* アプリラッパー */
  #app { flex: 1; min-height: 0; }

  /* ユーザー管理 */
  .user-mgmt-item { display:flex; align-items:center; gap:12px; padding:10px 14px; border:1px solid #e2e8f0; border-radius:8px; margin-bottom:8px; background:#fff; }
  .user-avatar-sm { width:36px; height:36px; border-radius:50%; background:#93c5fd; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:500; color:#1e3a5f; overflow:hidden; flex-shrink:0; }

  /* 日報 */
  #report-table th { padding:8px 10px; text-align:left; white-space:nowrap; font-weight:600; color:#475569; border-bottom:2px solid #e2e8f0; background:#f8fafc; }
  #report-table td { padding:8px 10px; border-bottom:1px solid #f1f5f9; }
  #report-table tbody tr:hover { background:#f8fafc; }
  @media (max-width: 768px) {
    #report-input-row td { display:block; padding:4px 8px !important; }
    #report-input-row td input { width:100% !important; box-sizing:border-box; }
  }

  /* スマホ対応 */
  @media (max-width: 768px) {
    #login-screen > div { width: 90% !important; padding: 24px !important; }
    .header-title-main { font-size: 14px !important; }
  }
  @media (max-width: 768px) {
    body { display: block; height: auto; }

    /* 左ペインを横スクロールのタブ形式に */
    .left-pane {
      width: 100% !important;
      min-width: 0 !important;
      height: auto !important;
      border-right: none !important;
      border-bottom: 1px solid #e2e8f0;
      flex-direction: row !important;
      overflow-x: auto !important;
      overflow-y: hidden !important;
      -webkit-overflow-scrolling: touch;
      padding: 8px 4px !important;
      white-space: nowrap;
    }
    .left-pane-list {
      display: flex;
      flex-direction: row;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 0 !important;
      flex: none;
    }
    .left-pane-footer {
      border-top: none !important;
      padding: 4px !important;
      flex-shrink: 0;
      display: flex;
      align-items: center;
    }
    .cat-item {
      display: inline-flex !important;
      padding: 6px 12px !important;
      margin: 0 4px !important;
      border-radius: 20px !important;
      border-left: none !important;
      border: 1px solid #e2e8f0 !important;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .cat-actions { display: none !important; }
    .cat-item.active {
      border-color: #3b82f6 !important;
    }
    .btn-add {
      width: auto !important;
      white-space: nowrap;
      padding: 6px 12px !important;
    }

    /* 2カラムレイアウトを縦に */
    .layout { flex-direction: column; height: auto; overflow: visible; }

    /* 右ペインを全幅に */
    .right-pane { overflow: visible !important; }
    .right-pane-content { padding: 12px !important; overflow-y: visible !important; }
    .qa-reply-row { flex-direction: column; }
    .qa-reply-name { width: 100%; }
    .btn.btn-blue.qa-submit { width: 100%; }

    /* 画像を全幅に */
    img { max-width: 100% !important; height: auto !important; }

    /* モーダルを全幅に */
    .modal {
      width: 95% !important;
      max-height: 90vh !important;
      overflow-y: auto !important;
    }
    .updates-grid { grid-template-columns: 1fr !important; }
    .left-pane-nav { display: flex; flex-direction: row; border-bottom: none; border-right: none; padding: 0; }
    .nav-label { display: none; }
    .nav-item { padding: 6px 12px; border-radius: 20px; border-left: none !important; border: 1px solid #e2e8f0; margin: 4px; white-space: nowrap; flex-shrink: 0; }
    .nav-item.active { border-color: #3b82f6; }
  }
</style>
</head>
<body>

<!-- ログイン画面 -->
<div id="login-screen" style="display:flex; align-items:center; justify-content:center; flex:1; background:#f8fafc;">
  <div style="background:white; border-radius:12px; border:0.5px solid #e2e8f0; padding:32px; width:360px;">
    <div style="background:#1e3a5f; color:white; padding:16px; border-radius:8px; margin-bottom:24px; text-align:center;">
      <div style="font-size:10px; color:#93c5fd;">税理士法人士魂商才</div>
      <div style="font-size:18px; font-weight:500;">事務所マニュアル</div>
    </div>
    <div style="margin-bottom:12px;">
      <label style="font-size:12px; color:#64748b;">Gmailアドレス</label>
      <input id="login-email" type="email" placeholder="xxx@gmail.com"
        style="width:100%; margin-top:4px; padding:8px 10px; border:0.5px solid #cbd5e1; border-radius:6px; font-size:13px;" />
    </div>
    <div style="margin-bottom:20px;">
      <label style="font-size:12px; color:#64748b;">パスワード</label>
      <input id="login-password" type="password" placeholder="パスワードを入力"
        style="width:100%; margin-top:4px; padding:8px 10px; border:0.5px solid #cbd5e1; border-radius:6px; font-size:13px;"
        onkeydown="if(event.key==='Enter')doLogin()" />
    </div>
    <div id="login-error" style="display:none; color:#E24B4A; font-size:12px; margin-bottom:12px;"></div>
    <button onclick="doLogin()"
      style="width:100%; padding:10px; background:#1e3a5f; color:white; border:none; border-radius:6px; font-size:14px; cursor:pointer;">
      ログイン
    </button>
  </div>
</div>

<!-- アプリ本体 -->
<div id="app" style="display:none; flex-direction:column; flex:1;">

<!-- ヘッダー -->
<div class="header">
  <div style="display:flex; flex-direction:column; line-height:1.3;">
    <span style="font-size:10px; color:#93c5fd;">税理士法人士魂商才</span>
    <span class="header-title-main" style="font-size:16px; font-weight:500; color:white;">事務所マニュアル</span>
  </div>
  <div id="user-info" style="margin-left:auto; display:flex; align-items:center; gap:10px; padding-right:16px;">
    <div id="user-avatar" style="width:32px; height:32px; border-radius:50%; background:#93c5fd; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:500; color:#1e3a5f; overflow:hidden;"></div>
    <span id="user-name" style="font-size:13px; color:white;"></span>
    <button onclick="doLogout()" style="font-size:11px; padding:3px 10px; border:0.5px solid rgba(255,255,255,0.4); border-radius:4px; background:transparent; color:white; cursor:pointer;">ログアウト</button>
  </div>
</div>

<!-- 2カラムレイアウト -->
<div class="layout">
  <!-- 左ペイン -->
  <div class="left-pane">
    <div class="left-pane-nav">
      <div class="nav-label">メニュー</div>
      <div class="nav-item" id="nav-home" onclick="showHome()">🏠 ホーム</div>
      <div class="nav-item" id="nav-qa" onclick="showQA()">
        ❓ Q&A
        <span id="qa-badge" style="display:none; margin-left:auto; font-size:10px; background:#E24B4A; color:white; border-radius:10px; padding:1px 6px;"></span>
      </div>
      <div class="nav-item" id="nav-report" onclick="showReport()">📋 日報</div>
      <div class="nav-item" id="nav-user-mgmt" style="display:none" onclick="showUserMgmt()">⚙ ユーザー管理</div>
    </div>
    <div class="left-pane-list" id="cat-list"></div>
    <div class="left-pane-footer">
      <button class="btn-add" onclick="addCategory()">＋ カテゴリ追加</button>
    </div>
  </div>

  <!-- 右ペイン -->
  <div class="right-pane">
    <!-- 検索バー（右ペイン内） -->
    <div class="search-bar">
      <input class="search-input" id="search-input" type="text" placeholder="マニュアルを検索..."
        oninput="searchManuals(this.value)">
    </div>

    <!-- コンテンツエリア -->
    <div class="right-pane-content">
      <!-- ホームビュー -->
      <div id="home-view"></div>

      <!-- カテゴリビュー -->
      <div id="category-view" style="display:none">
        <div class="right-header">
          <div class="right-title" id="right-title">カテゴリを選択してください</div>
          <button class="btn btn-blue" id="btn-add-manual" style="display:none" onclick="addManual()">＋ マニュアル追加</button>
        </div>
        <div id="manual-list"></div>
      </div>

      <!-- 検索ビュー -->
      <div id="search-view" style="display:none">
        <div class="right-header">
          <div class="right-title" id="search-title">検索結果</div>
        </div>
        <div id="search-results"></div>
      </div>

      <!-- Q&Aビュー -->
      <div id="qa-view" style="display:none">
        <div class="right-header">
          <div class="right-title">Q&amp;A</div>
          <button class="btn btn-blue" onclick="addQuestion()">＋ 質問する</button>
        </div>
        <div id="qa-list"></div>
      </div>

      <!-- ユーザー管理ビュー -->
      <div id="user-mgmt-view" style="display:none">
        <div class="right-header">
          <div class="right-title">ユーザー管理</div>
          <button class="btn btn-blue" onclick="addUser()">＋ ユーザー追加</button>
        </div>
        <div style="margin-bottom:16px;">
          <div style="font-size:12px; color:#64748b; margin-bottom:6px;">CSVで一括登録（name,email,role）</div>
          <input type="file" id="csv-import" accept=".csv" onchange="importUsersCSV(this)" />
        </div>
        <div id="user-mgmt-list"></div>
      </div>

      <!-- 日報ビュー -->
      <div id="report-view" style="display:none">
        <div class="right-header" style="flex-wrap:wrap; gap:8px; align-items:center;">
          <div class="right-title" id="report-title">日報</div>
          <select id="report-user-select" style="display:none; padding:6px 8px; border:1px solid #e2e8f0; border-radius:6px; font-size:13px;" onchange="onReportUserChange(this.value)"></select>
          <div style="display:flex; align-items:center; gap:6px; margin-left:auto;">
            <button class="btn btn-gray" style="padding:4px 10px;" onclick="prevReportMonth()">◀</button>
            <span id="report-month-label" style="font-size:13px; font-weight:600; min-width:80px; text-align:center;"></span>
            <button class="btn btn-gray" style="padding:4px 10px;" onclick="nextReportMonth()">▶</button>
          </div>
          <button class="btn btn-blue" onclick="document.getElementById('ri-date').focus()">＋ 追加</button>
        </div>
        <div id="report-summary" style="display:flex; gap:16px; padding:10px 14px; background:#f8fafc; border:1px solid #e2e8f0; border-radius:8px; margin-bottom:12px; font-size:13px; flex-wrap:wrap;"></div>
        <div style="overflow-x:auto;">
          <table id="report-table" style="width:100%; border-collapse:collapse; font-size:13px;">
            <thead>
              <tr>
                <th>日付</th><th>開始</th><th>終了</th>
                <th style="text-align:right;">時間</th>
                <th>会社CD</th><th>会社名</th><th>業務内容</th><th></th>
              </tr>
              <tr id="report-input-row" style="background:#eff6ff; border-bottom:1px solid #bfdbfe;">
                <td><input type="date" id="ri-date" style="width:130px; padding:5px; border:1px solid #cbd5e1; border-radius:5px; font-size:12px;"></td>
                <td><input type="time" id="ri-start" style="width:85px; padding:5px; border:1px solid #cbd5e1; border-radius:5px; font-size:12px;" oninput="calcReportHours()"></td>
                <td><input type="time" id="ri-end" style="width:85px; padding:5px; border:1px solid #cbd5e1; border-radius:5px; font-size:12px;" oninput="calcReportHours()"></td>
                <td style="text-align:right;"><span id="ri-hours" style="font-size:12px; color:#475569; min-width:36px; display:inline-block; text-align:right;">-</span></td>
                <td><input type="text" id="ri-code" placeholder="1234" style="width:60px; padding:5px; border:1px solid #cbd5e1; border-radius:5px; font-size:12px;"></td>
                <td><input type="text" id="ri-name" placeholder="会社名" style="width:120px; padding:5px; border:1px solid #cbd5e1; border-radius:5px; font-size:12px;"></td>
                <td><input type="text" id="ri-content" placeholder="業務内容" style="width:100%; min-width:140px; padding:5px; border:1px solid #cbd5e1; border-radius:5px; font-size:12px;" onkeydown="if(event.key==='Enter')saveReportEntry()"></td>
                <td><button class="btn btn-blue" style="padding:5px 10px; font-size:12px; white-space:nowrap;" onclick="saveReportEntry()">保存</button></td>
              </tr>
            </thead>
            <tbody id="report-entries"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

</div><!-- /#app -->

<!-- 編集モーダル -->
<div class="overlay" id="edit-overlay">
  <div class="modal">
    <div class="modal-title">マニュアルを編集</div>
    <div class="field-label">カテゴリ</div>
    <select class="field-select" id="modal-category"></select>
    <div class="field-label">タイトル</div>
    <input class="field-input" id="edit-title" type="text" placeholder="タイトルを入力">
    <div class="field-label">本文</div>
    <div id="quill-editor"></div>

    <!-- 画像管理 -->
    <div class="field-label">画像</div>
    <div class="img-list" id="edit-img-list"></div>
    <label class="img-upload-area">
      ＋ 画像を追加（複数選択可）
      <input type="file" id="edit-img-file" accept="image/*" multiple style="display:none" onchange="onImgFileChange(event)">
    </label>
    <div class="img-uploading" id="edit-img-uploading"></div>

    <div class="field-label">動画URL（YouTubeまたはVimeo）</div>
    <input class="field-input" id="edit-video" type="text" placeholder="https://...">
    <div class="field-label">更新者</div>
    <input class="field-input" id="edit-author" type="text" placeholder="氏名">
    <div class="modal-actions">
      <button class="btn btn-gray" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-blue" onclick="saveManual()">保存</button>
    </div>
  </div>
</div>

<script>
let _data = { categories: [] };
let _noticesData = { notices: [] };
let _qaData = { questions: [] };
let _usersData = { users: [] };
let _currentUser = null;
let _sessionPassword = null;
let _selCatId = null;
let _viewMode = 'home'; // 'home' | 'category' | 'search' | 'qa' | 'user-mgmt' | 'report'
let _reportData = { entries: [] };
let _currentReportMonth = '';
let _reportViewUserId = null;
let _openQId = null;
let _editCatId = null, _editManualId = null;
let _editImages = []; // { path, caption, url }
let quillInstance = null;

function initQuill(content) {
  if (quillInstance) {
    quillInstance.root.innerHTML = content || '';
    return;
  }
  quillInstance = new Quill('#quill-editor', {
    theme: 'snow',
    modules: {
      toolbar: [
        [{ 'header': [1, 2, 3, false] }],
        ['bold', 'italic', 'underline'],
        [{ 'color': [] }, { 'background': [] }],
        [{ 'list': 'ordered'}, { 'list': 'bullet' }],
        [{ 'indent': '-1'}, { 'indent': '+1' }],
        ['clean']
      ]
    }
  });
  quillInstance.root.innerHTML = content || '';
}

// 起動時にデータ取得（並列）
async function initApp() {
  const [manualsRes, noticesRes, qaRes] = await Promise.all([
    fetch('/api/manuals').then(r => r.json()),
    fetch('/api/notices').then(r => r.json()),
    fetch('/api/qa').then(r => r.json())
  ]);
  _data = manualsRes;
  _noticesData = noticesRes;
  _qaData = qaRes;
  if (!_data.categories) _data.categories = [];
  if (!_noticesData.notices) _noticesData.notices = [];
  if (!_qaData.questions) _qaData.questions = [];
  updateQaBadge();
  setView('home');
  render();
  renderHome();
}
window.addEventListener('load', () => {
  const stored = localStorage.getItem('manual_user');
  if (stored) {
    const user = JSON.parse(stored);
    _sessionPassword = sessionStorage.getItem('manual_session_pw') || null;
    showApp(user);
  }
});

function setView(mode) {
  _viewMode = mode;
  document.getElementById('home-view').style.display        = mode === 'home'      ? 'block' : 'none';
  document.getElementById('category-view').style.display    = mode === 'category'  ? 'block' : 'none';
  document.getElementById('search-view').style.display      = mode === 'search'    ? 'block' : 'none';
  document.getElementById('qa-view').style.display          = mode === 'qa'        ? 'block' : 'none';
  document.getElementById('user-mgmt-view').style.display   = mode === 'user-mgmt' ? 'block' : 'none';
  document.getElementById('report-view').style.display      = mode === 'report'    ? 'block' : 'none';
  document.getElementById('nav-home').classList.toggle('active', mode === 'home');
  document.getElementById('nav-qa').classList.toggle('active', mode === 'qa');
  document.getElementById('nav-report').classList.toggle('active', mode === 'report');
  const navUM = document.getElementById('nav-user-mgmt');
  if (navUM) navUM.classList.toggle('active', mode === 'user-mgmt');
}

function render() {
  const navUM = document.getElementById('nav-user-mgmt');
  if (navUM) navUM.style.display = (_currentUser?.role === 'admin') ? 'flex' : 'none';
  // 左ペイン
  const catList = document.getElementById('cat-list');
  catList.innerHTML = '';
  _data.categories.forEach((cat, idx) => {
    const el = document.createElement('div');
    el.className = 'cat-item' + (cat.id === _selCatId && _viewMode === 'category' ? ' active' : '');
    el.innerHTML = `
      <span class="cat-item-name" title="${esc(cat.name)}">${esc(cat.name)}</span>
      <div class="cat-actions">
        ${idx > 0 ? `<button class="cat-act-btn" title="上へ" onclick="event.stopPropagation();moveCat('${cat.id}',-1)">↑</button>` : ''}
        ${idx < _data.categories.length - 1 ? `<button class="cat-act-btn" title="下へ" onclick="event.stopPropagation();moveCat('${cat.id}',1)">↓</button>` : ''}
        <button class="cat-act-btn" title="名称変更" onclick="event.stopPropagation();renameCat('${cat.id}')">✏</button>
        <button class="cat-act-btn del" title="削除" onclick="event.stopPropagation();deleteCatById('${cat.id}')">×</button>
      </div>`;
    el.onclick = () => { _selCatId = cat.id; setView('category'); render(); renderCategory(); };
    catList.appendChild(el);
  });
  if (_viewMode === 'category') renderCategory();
}

function renderCategory() {
  const cat = _data.categories.find(c => c.id === _selCatId);
  document.getElementById('right-title').textContent = cat ? cat.name : 'カテゴリを選択してください';
  document.getElementById('btn-add-manual').style.display = cat ? 'inline-block' : 'none';
  const list = document.getElementById('manual-list');
  list.innerHTML = '';
  if (!cat) return;
  if (!cat.manuals || cat.manuals.length === 0) {
    list.innerHTML = '<div class="empty">マニュアルがありません</div>';
    return;
  }
  cat.manuals.forEach(m => renderManualCard(m, _selCatId, list));
}

function renderManualCard(m, catId, container) {
  const card = document.createElement('div');
  card.className = 'card';
  const imgBadge = (m.images && m.images.length > 0) ? `<span class="card-badge">画像${m.images.length}枚</span>` : '';
  card.innerHTML = `
    <div class="card-header" onclick="toggleCard('${m.id}')">
      <div style="display:flex;align-items:center;min-width:0;flex-wrap:wrap;gap:4px">
        <span class="card-title">${esc(m.title)}</span>
        ${m.video_url ? '<span class="card-badge">動画あり</span>' : ''}
        ${imgBadge}
      </div>
      <span class="card-meta">${m.updated_at || ''}${m.updated_by ? ' / ' + esc(m.updated_by) : ''}</span>
    </div>
    <div class="card-body" id="body-${m.id}">
      <div class="card-content">${m.content || ''}</div>
      ${(() => {
        const embedUrl = getEmbedUrl(m.video_url);
        if (embedUrl) return `<div style="position:relative;padding-bottom:56.25%;height:0;margin-top:12px;"><iframe src="${embedUrl}" style="position:absolute;top:0;left:0;width:100%;height:100%;" frameborder="0" allowfullscreen></iframe></div>`;
        if (m.video_url) return `<a class="card-video-link" href="${esc(m.video_url)}" target="_blank">▶ 動画を見る</a>`;
        return '';
      })()}
      <div class="card-images" id="imgs-${m.id}"></div>
      <div class="card-actions">
        <button class="btn btn-gray" onclick="openModal('${catId}','${m.id}')">編集</button>
        <button class="btn-text-red" onclick="deleteManual('${catId}','${m.id}')">削除</button>
      </div>
    </div>`;
  container.appendChild(card);
}

function toggleCard(id) {
  const el = document.getElementById('body-' + id);
  const wasOpen = el.classList.contains('open');
  el.classList.toggle('open');
  if (!wasOpen) loadCardImages(id);
}

async function loadCardImages(manualId) {
  const cat = _data.categories.find(c => c.id === _selCatId);
  const m = cat?.manuals?.find(x => x.id === manualId);
  if (!m || !m.images || m.images.length === 0) return;
  const container = document.getElementById('imgs-' + manualId);
  if (!container) return;
  container.innerHTML = '';
  for (const img of m.images) {
    const item = document.createElement('div');
    item.className = 'card-image-item';
    if (img.caption) {
      const cap = document.createElement('div');
      cap.className = 'card-image-caption';
      cap.textContent = img.caption;
      item.appendChild(cap);
    }
    const imgEl = document.createElement('img');
    imgEl.className = 'card-image-img';
    imgEl.alt = img.caption || '';
    item.appendChild(imgEl);
    container.appendChild(item);
    // 一時URLを非同期取得
    fetch(`/api/manuals/image_url?path=${encodeURIComponent(img.path)}`)
      .then(r => r.json())
      .then(d => { imgEl.src = d.url; })
      .catch(() => { imgEl.alt = '読み込みエラー'; });
  }
}

async function addCategory() {
  const name = prompt('カテゴリ名を入力してください');
  if (!name || !name.trim()) return;
  const id = 'cat_' + Date.now();
  _data.categories.push({ id, name: name.trim(), manuals: [] });
  _selCatId = id;
  await save();
  setView('category');
  render();
}

async function renameCat(id) {
  const cat = _data.categories.find(c => c.id === id);
  if (!cat) return;
  const name = prompt('新しいカテゴリ名を入力してください', cat.name);
  if (!name || !name.trim() || name.trim() === cat.name) return;
  cat.name = name.trim();
  await save();
  render();
}

async function moveCat(id, dir) {
  const idx = _data.categories.findIndex(c => c.id === id);
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= _data.categories.length) return;
  [_data.categories[idx], _data.categories[newIdx]] = [_data.categories[newIdx], _data.categories[idx]];
  await save();
  render();
}

async function deleteCatById(id) {
  const cat = _data.categories.find(c => c.id === id);
  if (!cat) return;
  const hasManuals = cat.manuals && cat.manuals.length > 0;
  const msg = hasManuals
    ? `「${cat.name}」にはマニュアルが${cat.manuals.length}件あります。削除しますか？\nマニュアルもすべて削除されます。`
    : `「${cat.name}」を削除しますか？`;
  if (!confirm(msg)) return;
  _data.categories = _data.categories.filter(c => c.id !== id);
  if (_selCatId === id) _selCatId = _data.categories[0]?.id || null;
  await save();
  render();
}

async function addManual() {
  const title = prompt('マニュアルのタイトルを入力してください');
  if (!title || !title.trim()) return;
  const cat = _data.categories.find(c => c.id === _selCatId);
  if (!cat) return;
  const id = 'm_' + Date.now();
  if (!cat.manuals) cat.manuals = [];
  cat.manuals.push({ id, title: title.trim(), content: '', images: [], video_url: '', updated_at: today(), updated_by: '' });
  await save();
  render();
  openModal(_selCatId, id);
}

async function deleteManual(catId, manualId) {
  const cat = _data.categories.find(c => c.id === catId);
  const m = cat?.manuals?.find(x => x.id === manualId);
  if (!confirm(`「${m?.title}」を削除しますか？`)) return;
  cat.manuals = cat.manuals.filter(x => x.id !== manualId);
  await save();
  render();
}

// ── ホーム ──────────────────────────────────────────
async function showHome() {
  const [noticesRes, qaRes] = await Promise.all([fetch('/api/notices'), fetch('/api/qa')]);
  _noticesData = await noticesRes.json();
  _qaData = await qaRes.json();
  if (!_noticesData.notices) _noticesData.notices = [];
  if (!_qaData.questions) _qaData.questions = [];
  updateQaBadge();
  setView('home');
  render();
  renderHome();
}

function renderHome() {
  const el = document.getElementById('home-view');
  // 最近の更新4件
  const all = [];
  _data.categories.forEach(cat => {
    (cat.manuals || []).forEach(m => all.push({ ...m, _catId: cat.id, _catName: cat.name }));
  });
  all.sort((a, b) => (b.updated_at || '').localeCompare(a.updated_at || ''));
  const recent = all.slice(0, 4);

  const noticeHtml = _noticesData.notices.length === 0
    ? '<div class="empty" style="padding:12px 0">お知らせはありません</div>'
    : _noticesData.notices.map((n, i) => `
      <div class="notice-card ${n.important ? 'important' : ''}">
        ${n.important ? '<span class="notice-badge">重要</span>' : ''}
        <div class="notice-content">
          <div>${esc(n.content)}</div>
          <div class="notice-meta">${esc(n.author || '')}${n.author && n.created_at ? ' · ' : ''}${n.created_at || ''}</div>
        </div>
        <button class="notice-del" onclick="deleteNotice(${i})" title="削除">×</button>
      </div>`).join('');

  const updatesHtml = recent.length === 0
    ? '<div class="empty" style="padding:12px 0">まだマニュアルがありません</div>'
    : `<div class="updates-grid">${recent.map(m => `
      <div class="update-card" onclick="jumpToManual('${m._catId}','${m.id}')">
        <div class="update-title">${esc(m.title)}</div>
        <div><span class="update-cat">${esc(m._catName)}</span></div>
        <div class="update-date">${m.updated_at || ''}${m.updated_by ? ' / ' + esc(m.updated_by) : ''}</div>
      </div>`).join('')}</div>`;

  // 未回答質問（最大3件）
  const unanswered = (_qaData.questions || []).filter(q => !q.answers || q.answers.length === 0).slice(0, 3);
  const qaHtml = unanswered.length === 0 ? '' : `
    <div style="margin-bottom:24px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div class="home-section-title" style="margin-bottom:0;border-bottom:none">❓ 未回答の質問</div>
        <button class="btn btn-gray" style="font-size:12px;padding:5px 10px" onclick="showQA()">Q&amp;A一覧</button>
      </div>
      <div style="border-bottom:1px solid #e2e8f0;margin-bottom:10px"></div>
      ${unanswered.map(q => `
        <div class="home-qa-card" onclick="showQA('${q.id}')">
          <div style="font-size:13px;font-weight:600;color:#92400e;margin-bottom:3px">${esc(q.title)}</div>
          <div style="font-size:11px;color:#a16207">${esc(q.author || '')}${q.author && q.created_at ? ' · ' : ''}${q.created_at || ''}</div>
        </div>`).join('')}
    </div>`;

  el.innerHTML = `
    <div style="margin-bottom:24px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div class="home-section-title" style="margin-bottom:0;border-bottom:none">📢 お知らせ</div>
        <button class="btn btn-gray" style="font-size:12px;padding:5px 10px" onclick="addNotice()">＋ 追加</button>
      </div>
      <div style="border-bottom:1px solid #e2e8f0;margin-bottom:10px"></div>
      ${noticeHtml}
    </div>
    ${qaHtml}
    <div>
      <div class="home-section-title">🕐 最近の更新</div>
      ${updatesHtml}
    </div>`;
}

function jumpToManual(catId, manualId) {
  _selCatId = catId;
  setView('category');
  render();
  renderCategory();
  // 該当カードを展開
  setTimeout(() => {
    const body = document.getElementById('body-' + manualId);
    if (body && !body.classList.contains('open')) {
      body.classList.add('open');
      loadCardImages(manualId);
    }
    body?.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 50);
}

async function addNotice() {
  const content = prompt('お知らせの内容を入力してください');
  if (!content || !content.trim()) return;
  const importantStr = prompt('重要フラグ（重要なら「1」、通常なら「0」）', '0');
  const important = importantStr === '1';
  const author = _currentUser?.name || '';
  _noticesData.notices.unshift({ id: 'n_' + Date.now(), content: content.trim(), important, author: author.trim(), created_at: today() });
  await saveNotices();
  renderHome();
}

async function deleteNotice(idx) {
  if (!confirm('このお知らせを削除しますか？')) return;
  _noticesData.notices.splice(idx, 1);
  await saveNotices();
  renderHome();
}

async function saveNotices() {
  await fetch('/api/notices', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(_noticesData)
  });
}

// ── Q&A ──────────────────────────────────────────
async function showQA(openId) {
  const res = await fetch('/api/qa');
  _qaData = await res.json();
  if (!_qaData.questions) _qaData.questions = [];
  if (openId) _openQId = openId;
  updateQaBadge();
  setView('qa');
  render();
  renderQA();
}

function updateQaBadge() {
  const unanswered = (_qaData.questions || []).filter(q => !q.answers || q.answers.length === 0).length;
  const badge = document.getElementById('qa-badge');
  if (badge) {
    badge.textContent = unanswered;
    badge.style.display = unanswered > 0 ? 'inline' : 'none';
  }
}

function renderQA() {
  const list = document.getElementById('qa-list');
  list.innerHTML = '';
  if (!_qaData.questions || _qaData.questions.length === 0) {
    list.innerHTML = '<div class="empty">質問はありません</div>';
    return;
  }
  _qaData.questions.forEach(q => {
    const ansCount = (q.answers || []).length;
    const card = document.createElement('div');
    card.className = 'qa-card';
    const bodyId = 'qa-body-' + q.id;
    const answersHtml = (q.answers || []).map(a => `
      <div class="qa-answer">
        <div class="qa-answer-content">${esc(a.content)}</div>
        <div class="qa-answer-meta">${esc(a.author || '')}${a.author && a.created_at ? ' · ' : ''}${a.created_at || ''}</div>
      </div>`).join('');
    card.innerHTML = `
      <div class="qa-card-header" onclick="toggleQA('${q.id}')">
        <div style="display:flex;align-items:center;min-width:0;flex:1;flex-wrap:wrap;gap:4px">
          <span class="qa-card-title">${esc(q.title)}</span>
          ${ansCount === 0
            ? '<span class="qa-badge-unanswered">未回答</span>'
            : `<span class="qa-badge-answered">回答${ansCount}件</span>`}
        </div>
        <span class="card-meta" style="flex-shrink:0">${esc(q.author || '')}${q.author && q.created_at ? ' · ' : ''}${q.created_at || ''}</span>
      </div>
      <div class="qa-body" id="${bodyId}">
        ${answersHtml}
        <div class="qa-reply-form">
          <div class="qa-reply-row">

function searchManuals(q) {
  if (!q || !q.trim()) { showHome(); return; }
  setView('search');
  render();
  const kw = q.trim().toLowerCase();
  const results = [];
  _data.categories.forEach(cat => {
    (cat.manuals || []).forEach(m => {
      const text = (m.title + ' ' + (m.content || '').replace(/<[^>]*>/g, '')).toLowerCase();
      if (text.includes(kw)) results.push({ ...m, _catId: cat.id, _catName: cat.name });
    });
  });
  document.getElementById('search-title').textContent = `検索結果：${results.length}件`;
  const container = document.getElementById('search-results');
  container.innerHTML = '';
  if (results.length === 0) {
    container.innerHTML = '<div class="empty">一致するマニュアルが見つかりません</div>';
    return;
  }
  results.forEach(m => {
    // カテゴリバッジをタイトル右に付けるため一時的にtitleを加工
    const origTitle = m.title;
    m = { ...m, title: m.title };
    const wrapper = document.createElement('div');
    wrapper.style.cssText = 'margin-bottom:8px';
    // カテゴリバッジ付きカードを描画

      badge.className = 'search-result-cat';
      badge.textContent = m._catName;
      titleSpan.after(badge);
    }
    container.appendChild(wrapper);
  });
}

function openModal(catId, manualId) {

function renderEditImages() {
  const list = document.getElementById('edit-img-list');
  list.innerHTML = '';
  _editImages.forEach((img, idx) => {
    const item = document.createElement('div');
    item.className = 'img-item';
    item.dataset.idx = idx;
    item.innerHTML = `
      <img class="img-thumb" src="" alt="${esc(img.caption || '')}" data-path="${esc(img.path)}">
      <div class="img-item-body">
        <input class="img-caption-input" type="text" placeholder="キャプション（任意）" value="${esc(img.caption || '')}"
          oninput="_editImages[${idx}].caption = this.value">
        <div class="img-item-actions">
          ${idx > 0 ? `<button class="btn-sm" onclick="moveImg(${idx},-1)">↑ 上へ</button>` : ''}
          ${idx < _editImages.length - 1 ? `<button class="btn-sm" onclick="moveImg(${idx},1)">↓ 下へ</button>` : ''}
          <button class="btn-sm" style="color:#ef4444;border-color:#fca5a5" onclick="removeImg(${idx})">削除</button>
        </div>
      </div>`;
    // サムネイルURLを非同期取得
    const thumbEl = item.querySelector('.img-thumb');
    if (img.url) {
      thumbEl.src = img.url;
    } else {
      fetch(`/api/manuals/image_url?path=${encodeURIComponent(img.path)}`)
        .then(r => r.json())
        .then(d => { thumbEl.src = d.url; _editImages[idx].url = d.url; })
        .catch(() => {});
    }
    list.appendChild(item);
  });
}

function moveImg(idx, dir) {
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= _editImages.length) return;
  [_editImages[idx], _editImages[newIdx]] = [_editImages[newIdx], _editImages[idx]];
  renderEditImages();
}

async function removeImg(idx) {
  const img = _editImages[idx];
  if (!confirm('この画像を削除しますか？')) return;
  await fetch('/api/manuals/delete_image', {
    method: 'DELETE',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ path: img.path })
  });
  _editImages.splice(idx, 1);
  renderEditImages();
}

async function onImgFileChange(event) {
  const files = Array.from(event.target.files);
  if (!files.length) return;
  const MAX_IMAGES = 10;
  if (_editImages.length + files.length > MAX_IMAGES) {
    alert(`画像は最大${MAX_IMAGES}枚までです（現在${_editImages.length}枚）`);
    document.getElementById('edit-img-file').value = '';
    return;
  }
  const statusEl = document.getElementById('edit-img-uploading');
  statusEl.textContent = `アップロード中... (0/${files.length})`;
  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    const fd = new FormData();
    fd.append('manual_id', _editManualId);
    fd.append('file', file);
    const res = await fetch('/api/manuals/upload_image', { method: 'POST', body: fd });
    if (res.ok) {
      const data = await res.json();
      _editImages.push({ path: data.path, caption: '', url: data.url });
    }
    statusEl.textContent = `アップロード中... (${i + 1}/${files.length})`;
  }
  statusEl.textContent = `${files.length}枚をアップロードしました`;
  document.getElementById('edit-img-file').value = '';
  renderEditImages();
}

function getEmbedUrl(url) {
  if (!url) return null;
  const yt = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\n?#]+)/);
  if (yt) return `https://www.youtube.com/embed/${yt[1]}`;
  const vimeo = url.match(/vimeo\.com\/([0-9]+)/);
  if (vimeo) return `https://player.vimeo.com/video/${vimeo[1]}`;
  return null;
}

function today() { return new Date().toISOString().slice(0, 10); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function importUsersCSV(input) {
  const file = input.files[0];
  if (!file) return;
  const text = await file.text();
  const cleaned = text.replace(/^\uFEFF/, '');
  const lines = cleaned.trim().split(/\r?\n/);
  const newUsers = lines.map((line, i) => {
    const cols = line.split(',').map(c => c.trim());
    return {
      id: 'u_' + Date.now() + '_' + i,
      name: cols[0] || '',
      email: cols[1] || '',
      role: cols[2] || 'staff',
      photo: ''
    };
  }).filter(u => u.name && u.email);
  const existingEmails = (_usersData.users || []).map(u => u.email);
  const toAdd = newUsers.filter(u => !existingEmails.includes(u.email));
  if (toAdd.length === 0) {
    alert('追加できるユーザーがありません');
    input.value = '';
    return;
  }
  _usersData.users = [...(_usersData.users || []), ...toAdd];
  await saveUsers();
  renderUserMgmt();
  input.value = '';
  alert(`${toAdd.length}件のユーザーを登録しました`);
}

// ── 日報 ──────────────────────────────────────────
function calcReportHours() {
  const start = document.getElementById('ri-start').value;
  const end   = document.getElementById('ri-end').value;
  const el    = document.getElementById('ri-hours');
  if (!start || !end) { el.textContent = '-'; return 0; }
  const [sh, sm] = start.split(':').map(Number);
  const [eh, em] = end.split(':').map(Number);
  const h = Math.round(((eh * 60 + em) - (sh * 60 + sm)) / 60 * 100) / 100;
  el.textContent = h > 0 ? h.toFixed(2) : '-';
  return h > 0 ? h : 0;
}

function calcSummary(entries) {
  const totalHours = entries.reduce((sum, e) => sum + (e.hours || 0), 0);
  const days      = new Set(entries.map(e => e.date)).size;
  const companies = new Set(entries.map(e => e.company_code).filter(Boolean)).size;
  return { totalHours: Math.round(totalHours * 100) / 100, days, companies };
}

async function showReport() {
  if (!_currentReportMonth) {
    const now = new Date();
    _currentReportMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
  }

async function loadReport() {

  const r = await fetch(`/api/reports/${userId}/${_currentReportMonth}`);
  _reportData = await r.json();
  if (!_reportData.entries) _reportData.entries = [];
  renderReport();
}

function renderReport() {
  const [y, m] = _currentReportMonth.split('-');
  document.getElementById('report-month-label').textContent = `${y}年${parseInt(m)}月`;

  // タイトル
  const sel = document.getElementById('report-user-select');
  const isAdmin = _currentUser?.role === 'admin' || _currentUser?.role === 'leader';
  if (isAdmin) {
    sel.style.display = 'inline-block';
    if (sel.options.length === 0) {
      fetch('/api/users').then(r => r.json()).then(d => {
        sel.innerHTML = (d.users || []).map(u =>
          `<option value="${esc(u.id)}"${u.id === _reportViewUserId ? ' selected' : ''}>${esc(u.name)}</option>`
        ).join('');
        const opt = sel.options[sel.selectedIndex];
        if (opt) document.getElementById('report-title').textContent = `日報 - ${opt.text}`;
      });
    } else {
      const opt = sel.options[sel.selectedIndex];
      if (opt) document.getElementById('report-title').textContent = `日報 - ${opt.text}`;
    }
  } else {
    sel.style.display = 'none';
    document.getElementById('report-title').textContent = `日報 - ${_currentUser?.name || ''}`;
  }

  // 日付初期値
  const dateEl = document.getElementById('ri-date');
  if (dateEl && !dateEl.value) dateEl.value = today();

  // サマリー
  const { totalHours, days, companies } = calcSummary(_reportData.entries);
  document.getElementById('report-summary').innerHTML =
    `<span>合計時間：<strong>${totalHours}h</strong></span>` +
    `<span style="color:#cbd5e1;">|</span>` +
    `<span>稼働日数：<strong>${days}日</strong></span>` +
    `<span style="color:#cbd5e1;">|</span>` +
    `<span>会社数：<strong>${companies}社</strong></span>`;

  // エントリ一覧（日付降順）
  const sorted = [..._reportData.entries].sort((a, b) => b.date.localeCompare(a.date) || b.id.localeCompare(a.id));
  const tbody = document.getElementById('report-entries');
  tbody.innerHTML = '';
  if (sorted.length === 0) {
    tbody.innerHTML = `<tr><td colspan="8" style="padding:20px; text-align:center; color:#94a3b8;">エントリがありません</td></tr>`;
    return;
  }
  sorted.forEach(e => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="white-space:nowrap;">${esc(e.date)}</td>
      <td style="white-space:nowrap;">${esc(e.start_time || '')}</td>
      <td style="white-space:nowrap;">${esc(e.end_time || '')}</td>
      <td style="text-align:right; white-space:nowrap;">${e.hours != null ? e.hours : ''}</td>
      <td style="white-space:nowrap;">${esc(e.company_code || '')}</td>
      <td style="white-space:nowrap;">${esc(e.company_name || '')}</td>
      <td>${esc(e.content || '')}</td>
      <td style="white-space:nowrap;"><button class="btn-sm" onclick="deleteReportEntry('${e.id}')">削除</button></td>`;
    tbody.appendChild(tr);
  });
}

async function deleteReportEntry(id) {
  if (!confirm('このエントリを削除しますか？')) return;
  _reportData.entries = _reportData.entries.filter(e => e.id !== id);
  await postReport();
  renderReport();
}

async function postReport() {
  const userId = _reportViewUserId || _currentUser?.id;
  await fetch(`/api/reports/${userId}/${_currentReportMonth}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(_reportData)
  });
}

function prevReportMonth() {
  const [y, m] = _currentReportMonth.split('-').map(Number);
  const d = new Date(y, m - 2, 1);
  _currentReportMonth = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
  document.getElementById('report-user-select').innerHTML = '';
  loadReport();
}

function nextReportMonth() {
  const [y, m] = _currentReportMonth.split('-').map(Number);
  const d = new Date(y, m, 1);
  _currentReportMonth = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
  document.getElementById('report-user-select').innerHTML = '';
  loadReport();
}

function onReportUserChange(userId) {
  _reportViewUserId = userId;
  loadReport();
}

// オーバーレイ外クリックで閉じる
document.getElementById('edit-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});
</script>
</body>
